<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="gi" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gv" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="35" fill="none" stroke="#e5e7eb" stroke-width="0.8" stroke-opacity="0.45" stroke-dasharray="3 3"/>

  <!-- Halos -->
  <circle cx="64"  cy="29"  r="10" fill="url(#gi)" filter="url(#blur2)"/>
  <circle cx="99"  cy="64"  r="10" fill="url(#gv)" filter="url(#blur2)"/>
  <circle cx="64"  cy="99"  r="10" fill="url(#gi)" filter="url(#blur2)"/>
  <circle cx="29"  cy="64"  r="10" fill="url(#gv)" filter="url(#blur2)"/>

  <!-- Nodes -->
  <circle cx="64"  cy="29"  r="5.5" fill="#6366f1" fill-opacity="0.88"/>
  <circle cx="99"  cy="64"  r="5.5" fill="#8b5cf6" fill-opacity="0.88"/>
  <circle cx="64"  cy="99"  r="5.5" fill="#8b5cf6" fill-opacity="0.88"/>
  <circle cx="29"  cy="64"  r="5.5" fill="#6366f1" fill-opacity="0.88"/>

  <!-- Waveform glow -->
  <polyline
    points="29,64 38,64 43,49 48,79 53,56.5 58,71.5 63,64 68,64 73,51.5 78,76.5 83,59 88,69 93,64 99,64"
    fill="none" stroke="#8b5cf6" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-opacity="0.4" filter="url(#blur3)"/>

  <!-- Waveform -->
  <polyline
    points="29,64 38,64 43,49 48,79 53,56.5 58,71.5 63,64 68,64 73,51.5 78,76.5 83,59 88,69 93,64 99,64"
    fill="none" stroke="url(#wg)" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center pulse -->
  <circle cx="66" cy="64" r="3.5" fill="#6366f1" fill-opacity="0.9"/>
</svg>
